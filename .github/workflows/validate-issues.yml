name: Validate issue backlog

on:
  push:
    paths:
      - 'scripts/github-issues.json'
      - '.github/labels.json'
  pull_request:
    paths:
      - 'scripts/github-issues.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate github-issues.json
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('scripts/github-issues.json', 'utf8'));
          const labels = JSON.parse(fs.readFileSync('.github/labels.json', 'utf8'));
          const labelNames = new Set(labels.map(l => l.name));
          const msTitles = new Set(data.milestones.map(m => m.title));
          let errors = 0;
          for (const issue of data.issues) {
            if (!msTitles.has(issue.milestone)) {
              console.error('Unknown milestone:', issue.milestone, 'in', issue.title);
              errors++;
            }
            for (const l of issue.labels) {
              if (!labelNames.has(l)) {
                console.error('Unknown label:', l, 'in', issue.title);
                errors++;
              }
            }
          }
          console.log('Issues:', data.issues.length);
          console.log('Milestones:', data.milestones.length);
          if (errors) process.exit(1);
          "

      - name: Summary
        run: echo "Backlog validation passed."
